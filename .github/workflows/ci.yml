name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  formula-check:
    name: Formula check
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Tap local checkout
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/gabrimatic"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/gabrimatic/homebrew-local-whisper"

      - name: Style check
        run: brew style gabrimatic/local-whisper/local-whisper

      - name: Ruby syntax
        run: ruby -c Formula/local-whisper.rb
